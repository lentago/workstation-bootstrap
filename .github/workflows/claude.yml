# ============================================================================
# Claude Code — Interactive @claude Responder
# ============================================================================
# Thin wrapper around lentago/shared-workflows/claude-responder.yml.
# ============================================================================

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, labeled]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, edited, labeled, assigned]

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: lentago/shared-workflows/.github/workflows/claude-responder.yml@main
    secrets: inherit
    with:
      allowed_tools: '"Bash" "Read" "Edit" "Write" "Glob" "Grep"'
